<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>帖子详情｜研途总控台</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .detail-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 24px;
        background: #fff;
        border-bottom: 1px solid var(--line);
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      }
      .detail-header-left {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .detail-header-left h1 {
        margin: 0;
        font-size: 18px;
      }
      .detail-container {
        max-width: 860px;
        margin: 0 auto;
        padding: 24px 18px 80px;
      }
      .detail-card {
        border-radius: 18px;
        border: 1px solid var(--line);
        background: #fff;
        box-shadow: 0 4px 16px rgba(0,0,0,0.04);
        padding: 24px;
      }
      .detail-author {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .detail-avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: var(--brand-light);
        color: var(--brand);
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 16px;
      }
      .detail-author-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .detail-author-name {
        font-weight: 700;
        font-size: 15px;
      }
      .detail-author-meta {
        font-size: 12px;
        color: var(--subtle);
      }
      .detail-title {
        font-size: 22px;
        font-weight: 800;
        margin: 0 0 14px;
        line-height: 1.4;
      }
      .detail-body {
        font-size: 15px;
        line-height: 1.8;
        color: #1e293b;
        margin-bottom: 18px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .detail-media {
        margin-bottom: 18px;
      }
      .detail-media .media-image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 10px;
        margin-bottom: 10px;
      }
      .detail-media .media-thumbnail {
        width: 100%;
        height: 140px;
        object-fit: cover;
        border-radius: 12px;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .detail-media .media-thumbnail:hover {
        opacity: 0.85;
      }
      .detail-media .video-frame {
        width: 100%;
        max-height: 400px;
        border-radius: 12px;
        margin-top: 10px;
      }
      .detail-media .inline-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .action-bar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 0;
        border-top: 1px solid #e5e7eb;
        border-bottom: 1px solid #e5e7eb;
        margin-top: 8px;
      }
      .action-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 18px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        color: #374151;
      }
      .action-btn:hover {
        background: #f8fafc;
      }
      .action-btn.liked {
        background: #fef2f2;
        border-color: #fca5a5;
        color: #dc2626;
      }
      .action-btn .icon {
        font-size: 16px;
      }
      .action-btn .count {
        font-size: 13px;
      }
      .replies-section {
        margin-top: 24px;
      }
      .replies-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 14px;
      }
      .reply-item {
        display: flex;
        gap: 10px;
        padding: 12px 0;
        border-bottom: 1px solid #f1f5f9;
      }
      .reply-item:last-child {
        border-bottom: none;
      }
      .reply-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--brand-light);
        color: var(--brand);
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 12px;
        flex-shrink: 0;
      }
      .reply-body {
        flex: 1;
      }
      .reply-author {
        font-weight: 600;
        font-size: 13px;
      }
      .reply-time {
        font-size: 11px;
        color: var(--subtle);
        margin-left: 8px;
      }
      .reply-text {
        font-size: 14px;
        margin-top: 4px;
        color: #374151;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .reply-media .media-image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 8px;
        margin-top: 8px;
      }
      .reply-media .media-thumbnail {
        width: 100%;
        height: 100px;
        object-fit: cover;
        border-radius: 8px;
        cursor: pointer;
      }
      .reply-form-card {
        margin-top: 20px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: #fff;
        padding: 18px;
      }
      .reply-form-card h3 {
        margin: 0 0 12px;
        font-size: 15px;
      }
      .reply-form-card textarea {
        width: 100%;
        min-height: 80px;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid #cbd5e1;
        font-family: inherit;
        font-size: 14px;
        resize: vertical;
        box-sizing: border-box;
      }
      .reply-form-card .reply-form-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .reply-form-card input[type="file"] {
        font-size: 12px;
      }
      .lightbox-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
        cursor: pointer;
      }
      .lightbox-overlay img {
        max-width: 90%;
        max-height: 90%;
        border-radius: 12px;
      }
      .nested-replies {
        margin-left: 20px;
        border-left: 2px solid var(--brand-light);
        padding-left: 12px;
        margin-top: 8px;
      }
      .nested-replies .reply-item {
        padding: 8px 0;
      }
      .nested-replies .reply-avatar {
        width: 24px;
        height: 24px;
        font-size: 10px;
      }
      .nested-replies .reply-text {
        font-size: 13px;
      }
      .reply-actions {
        margin-top: 4px;
      }
      .reply-action-btn {
        background: none;
        border: none;
        color: var(--brand);
        font-size: 12px;
        cursor: pointer;
        padding: 2px 6px;
        border-radius: 4px;
      }
      .reply-action-btn:hover {
        background: var(--brand-light);
      }
      .hashtag-highlight {
        color: var(--brand);
        font-weight: 600;
        cursor: pointer;
      }
      @media (max-width: 720px) {
        .detail-header { padding: 12px 14px; }
        .detail-container { padding: 14px 10px 60px; }
        .detail-title { font-size: 18px; }
        .detail-card { padding: 16px; }
      }
    </style>
  </head>
  <body>
    <div class="detail-header">
      <div class="detail-header-left">
        <a href="/forum" class="ghost-button" style="text-decoration:none;padding:8px 14px;font-size:13px;">返回社区</a>
        <h1>帖子详情</h1>
      </div>
      <span id="detail-user-name" class="muted" style="font-size:13px;"></span>
    </div>

    <div class="detail-container">
      <div id="topic-detail">
        <p class="muted">加载中...</p>
      </div>
    </div>

    <script src="/common.js"></script>
    <script src="/topic-detail.js"></script>
  </body>
</html>
